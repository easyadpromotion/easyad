    <!-- ✅ Your actual API key with all required libraries.
         This key is ONLY used to render the little map inside the "view on map"

         works even if this key/SDK has a problem. -->
    <script>
        var mapsReady = false;
        var mapsFailed = false;
        function initMap() { mapsReady = true; }
        // Fires if Google blocks this key for this domain (referrer restriction,
        // API not enabled, billing not set up, etc.) — without this, a blocked
        // key fails completely silently and the map modal hangs forever.
        window.gm_authFailure = function () {
            mapsFailed = true;
            console.error("❌ gm_authFailure: Google Maps blocked this request for this domain/key. " +
                "Check the key's HTTP referrer restrictions and that Maps JavaScript API is enabled.");

<script>
    // ── State ──────────────────────────────────────────────────
    var userLat = null, userLng = null;
    var mapInstance = null, markerInstance = null;
    // mapsReady / mapsFailed / initMap / gm_authFailure are defined in the
    // <head> script now — city detection below no longer depends on them.
    var activeMobile = null, userProfile = null;

    // ── Page Load ──────────────────────────────────────────────
    function loadHome() {
        activeMobile = localStorage.getItem("activeUser");
        if (!activeMobile) { window.location.href = "user_login.html"; return; }

        userProfile = JSON.parse(localStorage.getItem("userProfile_" + activeMobile)) || { wallet: 0, viewedAds: [] };

        // Balance
        document.getElementById("dispBal").innerText = "₹ " + parseFloat(userProfile.wallet || 0).toFixed(2);

        // Show saved city instantly if available
        if (userProfile.city) setCity(userProfile.city);

        // Start GPS
        startLocationDetect();

        // Notifications badge (from the shared notification store)
        updateNotifBadge();
        checkForNewAds();

        // Tasks
        loadTasks();
    }

    // ── Location Detection ─────────────────────────────────────
    function startLocationDetect() {
        if (!navigator.geolocation) {
            setCity(userProfile.city || "India");
            return;
        }

        navigator.geolocation.getCurrentPosition(
            function(pos) {
                userLat = pos.coords.latitude;
                userLng  = pos.coords.longitude;
                // Resolve the city name straight away — this does NOT wait on
                // or depend on the Google Maps SDK, so it still works even if
                // that script is blocked, slow, or misconfigured for this domain.
                reverseGeocodeAndSetCity(userLat, userLng);
            },
            function(err) {
                console.warn("GPS error:", err.message);
                setCity(userProfile.city || "India");
            },
            { enableHighAccuracy: true, timeout: 10000 }
        );
    }

    // ── Reverse Geocode via OpenStreetMap Nominatim ─────────────
    // Free, no API key, no SDK dependency — this is what actually determines
    // the city name shown in the header. The Google Maps SDK (if it loads) is
    // used only for the little visual map inside the "view on map" modal.
    function reverseGeocodeAndSetCity(lat, lng) {
        var city = userProfile.city || "India";
        var fullAddr = city;

        fetch("https://nominatim.openstreetmap.org/reverse?format=json&lat=" + lat + "&lon=" + lng + "&zoom=12&addressdetails=1", {
            headers: { "Accept": "application/json" }
        })
        .then(function(res){ return res.json(); })
        .then(function(data){
            var addr = data.address || {};
            city = addr.suburb || addr.city || addr.town || addr.state_district || addr.county || addr.state || city;
            fullAddr = data.display_name || city;
            finishLocationUpdate(city, fullAddr, lat, lng);
        })
        .catch(function(e){
            console.warn("Reverse geocode failed, falling back:", e.message);
            finishLocationUpdate(city, fullAddr, lat, lng);
        });
    }

    function finishLocationUpdate(city, fullAddr, lat, lng) {
        setCity(city);
        document.getElementById("mapCity").innerText    = city;
        document.getElementById("mapAddress").innerText = fullAddr;

        // Persist to this user's profile
        userProfile.city = city;
        userProfile.lat  = lat;
        userProfile.lng  = lng;
        localStorage.setItem("userProfile_" + activeMobile, JSON.stringify(userProfile));

        // Also share it with the app-wide location cache that notifications.html
        // reads, so "new ad nearby" distance-matching stays in sync everywhere.
        localStorage.setItem("eap_user_location", JSON.stringify({ lat: lat, lng: lng, label: city }));

        // A fresh location is exactly when a previously-out-of-range ad might now
        // be in range, so re-check for nearby ads immediately.
        checkForNewAds();
    }

    function getComp(comps, type) {
        var found = comps.find(function(c){ return c.types.indexOf(type) !== -1; });
        return found ? found.long_name : null;
    }

    function setCity(name) {
        document.getElementById("dispCity").innerHTML = name; // removes pulsing dot
    }

    // ── Map Modal ──────────────────────────────────────────────
    function openMap() {
        document.getElementById("mapOverlay").classList.add("open");
        if (userLat && userLng && mapsReady) {
            renderMap();
        } else if (mapsFailed) {
            document.getElementById("googleMap").innerHTML =
                '<div style="display:flex;align-items:center;justify-content:center;height:250px;color:#aaa;font-size:12px;text-align:center;padding:0 20px;">Map preview is unavailable right now.<br>Your city is still detected correctly above.</div>';
        } else if (userLat && userLng) {
            // Got GPS coords but the Maps SDK hasn't finished loading yet — poll briefly.
            setTimeout(function(){ if (document.getElementById("mapOverlay").classList.contains("open")) openMap(); }, 400);
        }
    }

    function closeMap() {
        document.getElementById("mapOverlay").classList.remove("open");
    }

    function handleOverlayClick(e) {
        if (e.target === document.getElementById("mapOverlay")) closeMap();
    }

    function renderMap() {
        var pos = { lat: userLat, lng: userLng };
        var mapDiv = document.getElementById("googleMap");

        if (!mapInstance) {
            mapInstance = new google.maps.Map(mapDiv, {
                center: pos,
                zoom: 15,
                disableDefaultUI: true,
                zoomControl: true,
                styles: [
                    { elementType: "geometry", stylers: [{ color: "#f5f5f5" }] },
                    { featureType: "water", elementType: "geometry", stylers: [{ color: "#c9d9e8" }] },
                    { featureType: "road", elementType: "geometry", stylers: [{ color: "#ffffff" }] },
                    { featureType: "poi", stylers: [{ visibility: "off" }] }
                ]
            });

            // Orange pin
            new google.maps.Marker({
                position: pos,
                map: mapInstance,
                title: "You are here",
                icon: {
                    path: google.maps.SymbolPath.CIRCLE,
                    scale: 11,
                    fillColor: "#ff9800",
                    fillOpacity: 1,
                    strokeColor: "#ffffff",
                    strokeWeight: 3
                }
            });
        } else {
            mapInstance.setCenter(pos);
        }
    }

    // ── Supabase-backed getActiveAds() — shared by loadTasks() and
    // checkForNewAds() below. Replaces localStorage("vendorCampaigns").
    async function getActiveAds() {
        const { data, error } = await supabaseClient
            .from('campaigns')
            .select('*')
            .order('created_at', { ascending: false });
        if (error) { console.error('Supabase getActiveAds error:', error); return []; }
        return (data || []).map(function (row) {
            return {
                id: row.id,
                type: row.type,
                status: row.status,
                title: row.title,
                name: row.title,
                category: row.category,
                location: row.location,
                lat: row.lat,
                lng: row.lng
            };
        });
    }

    // ── Tasks ──────────────────────────────────────────────────
    async function loadTasks() {
        var allAds   = await getActiveAds();
        var viewed   = userProfile.viewedAds || [];
        // NOTE: was checking ad.status === "Active" — tightened to match
        // whatever admin_approve_ads.html actually sets (see isLiveStatus()
        // below). If your approval page uses a specific status string like
        // "Approved" or "Live", both this and the notification matcher will
        // pick it up automatically as long as it isn't "Pending"/"Rejected".
        var active   = allAds.filter(function(ad){ return isLiveStatus(ad.status) && viewed.indexOf(ad.id) === -1; });
        var container = document.getElementById("taskContainer");

        container.innerHTML = "";

        if (active.length === 0) {
            container.innerHTML = '<div class="empty-state">No new tasks available.<br>Check back later!</div>';
            if (allAds.length === 0) {
                container.innerHTML += '<div class="task-card"><div class="t-left"><div class="t-icon">🏦</div><div class="t-info"><div class="t-name">Business Loans</div><div class="t-sub">Finance • High Reward</div></div></div><a href="frame-ads.html" class="start-btn">Start</a></div>';
            }
            return;
        }

        active.forEach(function(ad) {
            var link = "frame-ads.html", icon = "🖼️";
             if (ad.type === "Video")  { link = "video-ads.html"; icon = "▶️"; }
            if (ad.type === "Survey") { link = "surveys.html";   icon = "📝"; }
            // Fix: use ad.name, ad.title, or ad.adName with fallback
            var name = ad.name || ad.title || ad.adName || "Sponsored Ad";
            var cat  = ad.category || ad.type || "Task";

            container.innerHTML += '<div class="task-card"><div class="t-left"><div class="t-icon">' + icon + '</div><div class="t-info"><div class="t-name">' + name + '</div><div class="t-sub">' + cat + '</div></div></div><a href="' + link + '" class="start-btn">Start</a></div>';
        });
    }

    // ═══════════════════════════════════════════════════════════
    // NOTIFICATION ENGINE — shares localStorage keys with
    // notifications.html so both pages agree on what's been seen,
    // what's unread, and what counts as "nearby". Having this here
    // (not just on notifications.html) is what makes a new ad pop
    // up immediately while the user is sitting on the home screen,
    // which is where they'll actually see it most of the time.
    // ═══════════════════════════════════════════════════════════
    var SEEN_KEY = "eap_seen_ad_ids";
    var NOTIF_KEY = "eap_user_notifications";
    var LOC_KEY = "eap_user_location";
    var NEARBY_RADIUS_KM = 25;
    var POLL_MS = 4000;

    function loadJSON(key, fallback) {
        try { var raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; }
        catch (e) { return fallback; }
    }
    function saveJSON(key, val) { localStorage.setItem(key, JSON.stringify(val)); }
    function adTitle(ad) { return ad.title || ad.name || ad.adName || "New Ad"; }
    function isLiveStatus(status) {
        var s = (status || "").toLowerCase();
        return s !== "" && s !== "pending" && s.indexOf("reject") === -1 && s.indexOf("declin") === -1;
    }
    function haversineKm(lat1, lon1, lat2, lon2) {
        var R = 6371;
        var dLat = (lat2 - lat1) * Math.PI / 180, dLon = (lon2 - lon1) * Math.PI / 180;
        var a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function updateNotifBadge() {
        var notifs = loadJSON(NOTIF_KEY, []);
        var unread = notifs.filter(function(n){ return n.unread; }).length;
        var badge = document.getElementById("notifBadge");
        if (unread > 0) { badge.textContent = unread > 9 ? "9+" : unread; badge.classList.add("show"); }
        else { badge.classList.remove("show"); }
    }

    function showHomeToast(title, msg) {
        document.getElementById("homeToastTitle").textContent = title;
        document.getElementById("homeToastMsg").textContent = msg;
        var toast = document.getElementById("homeToast");
        toast.classList.add("show");
        clearTimeout(showHomeToast._t);
        showHomeToast._t = setTimeout(function(){ toast.classList.remove("show"); }, 5000);
    }

    async function checkForNewAds() {
        var ads = await getActiveAds();
        if (!ads.length) return;
        var userLoc = loadJSON(LOC_KEY, null);
        var seen = loadJSON(SEEN_KEY, []);
        var seenSet = {};
        seen.forEach(function(id){ seenSet[id] = true; });
        var notifs = loadJSON(NOTIF_KEY, []);
        var addedAny = false;

        ads.forEach(function(ad) {
            if (!ad || !ad.id || seenSet[ad.id]) return;
            if (!isLiveStatus(ad.status)) return;

            var matchesLocation = true, distLabel = ad.location || "you";
            if (userLoc && userLoc.lat != null && ad.lat != null && ad.lng != null) {
                var dist = haversineKm(userLoc.lat, userLoc.lng, ad.lat, ad.lng);
                matchesLocation = dist <= NEARBY_RADIUS_KM;
                distLabel = dist.toFixed(1) + "km away";
            }

            seenSet[ad.id] = true; // processed either way
            if (!matchesLocation) return;

            var title = "📢 New " + (ad.type || "Ad") + " from a vendor!";
            var msg = adTitle(ad) + " is live — " + distLabel + ". Tap to check it out.";
            notifs.unshift({ id: "ad_" + ad.id, title: title, msg: msg, time: Date.now(), unread: true });
            addedAny = true;
            showHomeToast(title, msg);
        });

        var newSeen = [];
        for (var k in seenSet) newSeen.push(k);
        saveJSON(SEEN_KEY, newSeen);

        if (addedAny) {
            saveJSON(NOTIF_KEY, notifs);
            updateNotifBadge();
        }
    }

    setInterval(checkForNewAds, POLL_MS);
    // ⚠️ The old cross-tab "storage" event listener for vendorCampaigns is
    // removed — that only ever fired when localStorage changed on this
    // same origin/browser, which doesn't apply now that ads live in
    // Supabase. The setInterval poll above is now the only mechanism that
    // catches new/approved ads, including ones posted from other devices.
    window.addEventListener("storage", function(e){
        if (e.key === NOTIF_KEY) updateNotifBadge();
    });
</script>
</body>
</html>
