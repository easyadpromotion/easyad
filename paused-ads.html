<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paused Ads</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { font-family:'Poppins',sans-serif; background:#e0f2f1; margin:0; padding:20px; display:flex; justify-content:center; min-height:100vh; }
  .mobile-screen { width:100%; max-width:380px; min-height:100vh; background:#f8f9fa; border:8px solid #fff; border-radius:40px; box-shadow:0 30px 60px rgba(0,0,0,0.1),0 0 0 2px #b2dfdb; display:flex; flex-direction:column; position:relative; overflow:hidden; }
  .header { background:#ff9800; padding:25px 20px 20px; color:white; display:flex; align-items:center; border-radius:0 0 20px 20px; box-shadow:0 4px 10px rgba(255,152,0,0.25); z-index:10; flex-shrink:0; }
  .back-btn { text-decoration:none; color:white; font-size:24px; margin-right:15px; font-weight:bold; }
  .page-title { font-size:18px; font-weight:700; }
  .container { padding:20px; flex:1; overflow-y:auto; padding-bottom:90px; }
  .container::-webkit-scrollbar { display:none; }

  .summary-bar { background:white; border-radius:14px; padding:16px; margin-bottom:18px; text-align:center; box-shadow:0 4px 10px rgba(0,0,0,0.03); border-bottom:4px solid #ff9800; }
  .summary-num { font-size:26px; font-weight:800; color:#ff9800; }
  .summary-lbl { font-size:11px; color:#888; font-weight:600; text-transform:uppercase; letter-spacing:.5px; }

  .ad-card { background:white; border-radius:14px; padding:16px; margin-bottom:14px; box-shadow:0 4px 10px rgba(0,0,0,0.03); border-left:4px solid #ff9800; }
  .ad-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
  .ad-name { font-size:14px; font-weight:700; color:#222; }
  .ad-type { font-size:9px; font-weight:700; color:#ff9800; background:#fff3e0; padding:3px 8px; border-radius:20px; text-transform:uppercase; }
  .info-row { display:flex; justify-content:space-between; font-size:11px; color:#888; margin-bottom:6px; }
  .info-row b { color:#333; font-weight:600; }
  .reason-box { background:#fff8e1; border:1px dashed #ffb74d; border-radius:8px; padding:8px 10px; margin-top:8px; font-size:11px; color:#7a5a00; }

  .empty-state { text-align:center; padding:60px 20px; color:#999; }
  .empty-state .ic { font-size:40px; opacity:.4; margin-bottom:10px; }
  .empty-state p { font-size:12px; }

  .bottom-nav { position:absolute; bottom:0; width:100%; background:white; padding:12px 20px; display:flex; justify-content:space-between; align-items:center; border-top:1px solid #eee; box-sizing:border-box; box-shadow:0 -5px 20px rgba(0,0,0,0.05); }
  .nav-item { text-align:center; color:#aaa; font-size:10px; cursor:pointer; flex:1; }
  .nav-item.active { color:#009688; font-weight:700; }
  .nav-icon { font-size:22px; display:block; margin-bottom:3px; }
</style>
</head>
<body>
<div class="mobile-screen">
  <div class="header">
    <a href="vendor-dashboard.html" class="back-btn">&larr;</a>
    <div class="page-title">Paused Ads</div>
  </div>

  <div class="container">
    <div class="summary-bar">
      <div class="summary-num" id="summaryCount">0</div>
      <div class="summary-lbl">Ads On Hold</div>
    </div>
    <div id="listArea"></div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item" onclick="window.location.href='vendor-dashboard.html'"><span class="nav-icon">🏠</span> Home</div>
    <div class="nav-item active" onclick="window.location.href='my-ads.html'"><span class="nav-icon">📢</span> My Ads</div>
    <div class="nav-item" onclick="window.location.href='wallet.html'"><span class="nav-icon">👛</span> Wallet</div>
    <div class="nav-item" onclick="window.location.href='vendor-settings.html'"><span class="nav-icon">⚙️</span> Settings</div>
  </div>
</div>

<script>
  function getAds() {
    try { return JSON.parse(localStorage.getItem("vendorCampaigns")) || []; }
    catch (e) { return []; }
  }
  function getAdName(ad) { return ad.title || ad.name || ad.id || "Untitled Ad"; }
  function typeIcon(t) { return t === "Frame" ? "🖼️" : t === "Video" ? "🎬" : t === "Survey" ? "📋" : "📢"; }

  function render() {
    const ads = getAds().filter(a => (a.status || "").toLowerCase() === "paused");
    document.getElementById("summaryCount").innerText = ads.length;
    const listArea = document.getElementById("listArea");

    if (!ads.length) {
      listArea.innerHTML = `
        <div class="empty-state">
          <div class="ic">⏸️</div>
          <p>No ads are currently paused.</p>
        </div>`;
      return;
    }

    listArea.innerHTML = ads.map(ad => `
      <div class="ad-card">
        <div class="ad-top">
          <div class="ad-name">${typeIcon(ad.type)} ${getAdName(ad)}</div>
          <div class="ad-type">${ad.type || "Ad"}</div>
        </div>
        <div class="info-row"><span>Posted On</span><b>${ad.date || "—"}</b></div>
        <div class="info-row"><span>Paused On</span><b>${ad.pausedAt || "Not recorded"}</b></div>
        <div class="reason-box">⚠️ ${ad.pauseReason ? ad.pauseReason : "No reason has been specified by admin yet."}</div>
      </div>
    `).join("");
  }
  render();
</script>

<!--
  ⚠️ NOTE FOR ADMIN-SIDE INTEGRATION:
  To populate "Paused On" and the reason box, when an ad is paused from
  the admin panel, set these two fields on the ad object before saving
  it back to localStorage("vendorCampaigns"):
    ad.status      = "Paused"
    ad.pausedAt    = new Date().toLocaleString()
    ad.pauseReason = "<reason text entered by admin>"
-->
</body>
</html>
