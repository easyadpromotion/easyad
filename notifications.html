<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifications</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { font-family:'Poppins',sans-serif; background:#e0f2f1; margin:0; padding:20px; display:flex; justify-content:center; min-height:100vh; }
  .mobile-screen { width:100%; max-width:380px; min-height:100vh; background:#f8f9fa; border:8px solid #fff; border-radius:40px; box-shadow:0 30px 60px rgba(0,0,0,0.1),0 0 0 2px #b2dfdb; display:flex; flex-direction:column; position:relative; overflow:hidden; }
  .header { background:#009688; padding:25px 20px 20px; color:white; display:flex; align-items:center; border-radius:0 0 20px 20px; box-shadow:0 4px 10px rgba(0,150,136,0.2); z-index:10; flex-shrink:0; }
  .back-btn { text-decoration:none; color:white; font-size:24px; margin-right:15px; font-weight:bold; }
  .page-title { font-size:18px; font-weight:700; }
  .container { padding:20px; flex:1; overflow-y:auto; }
  .container::-webkit-scrollbar { display:none; }

  .notif-card { background:white; border-radius:14px; padding:14px 16px; margin-bottom:12px; box-shadow:0 4px 10px rgba(0,0,0,0.03); cursor:pointer; border-left:4px solid #009688; position:relative; }
  .notif-card.read { border-left-color:#ddd; opacity:.7; }
  .nc-title { font-size:13px; font-weight:700; color:#222; margin-bottom:4px; }
  .nc-msg { font-size:12px; color:#666; }
  .nc-date { font-size:10px; color:#aaa; margin-top:6px; }
  .unread-dot { position:absolute; top:14px; right:14px; width:8px; height:8px; border-radius:50%; background:#e53935; }

  .empty-state { text-align:center; padding:60px 20px; color:#999; }
  .empty-state .ic { font-size:40px; opacity:.4; margin-bottom:10px; }
  .empty-state p { font-size:12px; }
</style>
</head>
<body>
<div class="mobile-screen">
  <div class="header">
    <a href="vendor-settings.html" class="back-btn">&larr;</a>
    <div class="page-title">Notifications</div>
  </div>
  <div class="container" id="listArea"></div>
</div>

<script>
  // Notifications live in localStorage("vendorNotifications") as a JSON
  // array of: { id, title, message, date, read }
  // ⚠️ NOTE: no backend/admin currently pushes into this key, so this
  // page will show the empty state until something writes to it —
  // e.g. an admin panel notifying a vendor their ad was approved/paused.
  function getNotifications() {
    try { return JSON.parse(localStorage.getItem("vendorNotifications")) || []; }
    catch (e) { return []; }
  }
  function saveNotifications(list) {
    localStorage.setItem("vendorNotifications", JSON.stringify(list));
  }

  function render() {
    const notifs = getNotifications().slice().reverse();
    const listArea = document.getElementById("listArea");

    if (!notifs.length) {
      listArea.innerHTML = `
        <div class="empty-state">
          <div class="ic">🔔</div>
          <p>No notifications yet.<br>You'll see updates about your ads here.</p>
        </div>`;
      return;
    }

    listArea.innerHTML = notifs.map(n => `
      <div class="notif-card ${n.read ? "read" : ""}" onclick="markRead('${n.id}')">
        ${!n.read ? '<div class="unread-dot"></div>' : ""}
        <div class="nc-title">${n.title || "Notification"}</div>
        <div class="nc-msg">${n.message || ""}</div>
        <div class="nc-date">${n.date || ""}</div>
      </div>
    `).join("");
  }

  function markRead(id) {
    const list = getNotifications();
    const item = list.find(n => n.id === id);
    if (item) item.read = true;
    saveNotifications(list);
    render();
  }

  render();
</script>
</body>
</html>
