<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallet</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { font-family:'Poppins',sans-serif; background:#e0f2f1; margin:0; padding:20px; display:flex; justify-content:center; min-height:100vh; }
  .mobile-screen { width:100%; max-width:380px; min-height:100vh; background:#f8f9fa; border:8px solid #fff; border-radius:40px; box-shadow:0 30px 60px rgba(0,0,0,0.1),0 0 0 2px #b2dfdb; display:flex; flex-direction:column; position:relative; overflow:hidden; }
  .header { background:#009688; padding:25px 20px 20px; color:white; display:flex; align-items:center; border-radius:0 0 20px 20px; box-shadow:0 4px 10px rgba(0,150,136,0.2); z-index:10; flex-shrink:0; }
  .back-btn { text-decoration:none; color:white; font-size:24px; margin-right:15px; font-weight:bold; }
  .page-title { font-size:18px; font-weight:700; }
  .container { padding:20px; flex:1; overflow-y:auto; padding-bottom:90px; }
  .container::-webkit-scrollbar { display:none; }

  .balance-card {
    background: linear-gradient(135deg,#009688,#00695c); color:white; border-radius:18px;
    padding:26px 20px; text-align:center; margin-bottom:20px; box-shadow:0 10px 25px rgba(0,150,136,0.3);
  }
  .balance-lbl { font-size:11px; opacity:.85; text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
  .balance-amt { font-size:32px; font-weight:800; }
  .balance-note { font-size:10px; opacity:.75; margin-top:8px; }

  .sec-title { font-size:13px; font-weight:700; color:#333; margin-bottom:10px; }

  .refund-card { background:white; border-radius:14px; padding:14px 16px; margin-bottom:12px; box-shadow:0 4px 10px rgba(0,0,0,0.03); border-left:4px solid #009688; }
  .rf-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .rf-name { font-size:13px; font-weight:700; color:#222; }
  .rf-amt { font-size:14px; font-weight:800; color:#009688; }
  .rf-grid { display:flex; justify-content:space-between; font-size:10px; color:#888; }
  .rf-grid b { color:#333; font-size:12px; display:block; }

  .empty-state { text-align:center; padding:50px 20px; color:#999; }
  .empty-state .ic { font-size:40px; opacity:.4; margin-bottom:10px; }
  .empty-state p { font-size:12px; }

  .bottom-nav { position:absolute; bottom:0; width:100%; background:white; padding:12px 20px; display:flex; justify-content:space-between; align-items:center; border-top:1px solid #eee; box-sizing:border-box; box-shadow:0 -5px 20px rgba(0,0,0,0.05); }
  .nav-item { text-align:center; color:#aaa; font-size:10px; cursor:pointer; flex:1; }
  .nav-item.active { color:#009688; font-weight:700; }
  .nav-icon { font-size:22px; display:block; margin-bottom:3px; }
</style>
</head>
<body>
<div class="mobile-screen">
  <div class="header">
    <a href="vendor-dashboard.html" class="back-btn">&larr;</a>
    <div class="page-title">Wallet</div>
  </div>

  <div class="container">
    <div class="balance-card">
      <div class="balance-lbl">Available Balance</div>
      <div class="balance-amt" id="balanceAmt">₹ 0.00</div>
      <div class="balance-note">Auto-credited from unused views on completed ads (e.g. paid for 500 views, only 300 delivered → ₹ refund for the remaining 200)</div>
    </div>

    <div class="sec-title">Refund Breakdown</div>
    <div id="listArea"></div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item" onclick="window.location.href='vendor-dashboard.html'"><span class="nav-icon">🏠</span> Home</div>
    <div class="nav-item" onclick="window.location.href='my-ads.html'"><span class="nav-icon">📢</span> My Ads</div>
    <div class="nav-item active" onclick="window.location.href='vendor_wallet.html'"><span class="nav-icon">👛</span> Wallet</div>
    <div class="nav-item" onclick="window.location.href='vendor-settings.html'"><span class="nav-icon">⚙️</span> Settings</div>
  </div>
</div>

<script>
  function getAds() {
    try { return JSON.parse(localStorage.getItem("vendorCampaigns")) || []; }
    catch (e) { return []; }
  }
  function getAdName(ad) { return ad.title || ad.name || ad.id || "Untitled Ad"; }
  function typeIcon(t) { return t === "Frame" ? "🖼️" : t === "Video" ? "🎬" : t === "Survey" ? "📋" : "📢"; }
  function parseCurrency(str) {
    if (typeof str === "number") return str;
    if (!str) return 0;
    return parseFloat(String(str).replace(/[₹,\s]/g, "")) || 0;
  }
  function formatCurrency(n) { return "₹ " + Number(n).toFixed(2); }

  // Refund logic: for each COMPLETED ad that has both a numeric target
  // and a tracked delivered-views count, if fewer views were delivered
  // than the target paid for, refund the unused portion proportionally.
  //   unitCost = totalBudget / targetViews
  //   refund   = unitCost * (targetViews - deliveredViews)
  // Frame ads (no "stats" object yet) are skipped — their views aren't
  // tracked, so we can't compute a fair refund for them.
  function computeRefunds() {
    const ads = getAds().filter(a => (a.status || "").toLowerCase() === "completed");
    const refunds = [];

    ads.forEach(ad => {
      const target = parseFloat(ad.target);
      const delivered = (ad.stats && typeof ad.stats.views === "number") ? ad.stats.views : null;
      const budget = parseCurrency(ad.budget);

      if (!target || delivered === null || !budget) return;
      if (delivered >= target) return; // fully delivered, nothing owed back

      const unitCost = budget / target;
      const unused = target - delivered;
      const refund = unitCost * unused;

      refunds.push({ ad, target, delivered, unused, refund });
    });

    return refunds;
  }

  function render() {
    const refunds = computeRefunds();
    const total = refunds.reduce((sum, r) => sum + r.refund, 0);
    document.getElementById("balanceAmt").innerText = formatCurrency(total);

    const listArea = document.getElementById("listArea");
    if (!refunds.length) {
      listArea.innerHTML = `
        <div class="empty-state">
          <div class="ic">👛</div>
          <p>No refunds yet.<br>This fills in once a completed Video/Survey ad delivers fewer views than paid for.</p>
        </div>`;
      return;
    }

    listArea.innerHTML = refunds.map(r => `
      <div class="refund-card">
        <div class="rf-top">
          <div class="rf-name">${typeIcon(r.ad.type)} ${getAdName(r.ad)}</div>
          <div class="rf-amt">${formatCurrency(r.refund)}</div>
        </div>
        <div class="rf-grid">
          <div><b>${r.target}</b>Paid For</div>
          <div><b>${r.delivered}</b>Delivered</div>
          <div><b>${r.unused}</b>Unused</div>
        </div>
      </div>
    `).join("");
  }
  render();
</script>
</body>
</html>
