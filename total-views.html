<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Total Views</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { font-family:'Poppins',sans-serif; background:#e0f2f1; margin:0; padding:20px; display:flex; justify-content:center; min-height:100vh; }
  .mobile-screen { width:100%; max-width:380px; min-height:100vh; background:#f8f9fa; border:8px solid #fff; border-radius:40px; box-shadow:0 30px 60px rgba(0,0,0,0.1),0 0 0 2px #b2dfdb; display:flex; flex-direction:column; position:relative; overflow:hidden; }
  .header { background:#2196f3; padding:25px 20px 20px; color:white; display:flex; align-items:center; border-radius:0 0 20px 20px; box-shadow:0 4px 10px rgba(33,150,243,0.25); z-index:10; flex-shrink:0; }
  .back-btn { text-decoration:none; color:white; font-size:24px; margin-right:15px; font-weight:bold; }
  .page-title { font-size:18px; font-weight:700; }
  .container { padding:20px; flex:1; overflow-y:auto; padding-bottom:90px; }
  .container::-webkit-scrollbar { display:none; }

  .summary-bar { background:white; border-radius:14px; padding:22px; margin-bottom:18px; text-align:center; box-shadow:0 4px 10px rgba(0,0,0,0.03); border-bottom:4px solid #2196f3; }
  .summary-num { font-size:32px; font-weight:800; color:#2196f3; }
  .summary-lbl { font-size:11px; color:#888; font-weight:600; text-transform:uppercase; letter-spacing:.5px; }
  .summary-note { font-size:10px; color:#aaa; margin-top:8px; }

  .sec-title { font-size:13px; font-weight:700; color:#333; margin-bottom:10px; }

  .ad-row { background:white; border-radius:12px; padding:14px; margin-bottom:10px; box-shadow:0 3px 8px rgba(0,0,0,0.03); display:flex; justify-content:space-between; align-items:center; cursor:pointer; }
  .ad-row:active { background:#f5f9ff; }
  .ad-name { font-size:13px; font-weight:600; color:#222; }
  .ad-type { font-size:9px; color:#2196f3; background:#e3f2fd; padding:2px 7px; border-radius:20px; font-weight:700; margin-left:6px; }
  .ad-views { font-size:16px; font-weight:800; color:#2196f3; }
  .ad-views small { display:block; font-size:9px; color:#999; font-weight:600; }

  .empty-state { text-align:center; padding:60px 20px; color:#999; }
  .empty-state .ic { font-size:40px; opacity:.4; margin-bottom:10px; }
  .empty-state p { font-size:12px; }

  .bottom-nav { position:absolute; bottom:0; width:100%; background:white; padding:12px 20px; display:flex; justify-content:space-between; align-items:center; border-top:1px solid #eee; box-sizing:border-box; box-shadow:0 -5px 20px rgba(0,0,0,0.05); }
  .nav-item { text-align:center; color:#aaa; font-size:10px; cursor:pointer; flex:1; }
  .nav-item.active { color:#009688; font-weight:700; }
  .nav-icon { font-size:22px; display:block; margin-bottom:3px; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = "https://ofluxzckhnydqgwtzjth.supabase.co";
  const SUPABASE_KEY = "sb_publishable_qx2bXh00tGoDTrYjhl9Wcg_J9XKdQts";
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
</script>
</head>
<body>
<div class="mobile-screen">
  <div class="header">
    <a href="vendor-dashboard.html" class="back-btn">&larr;</a>
    <div class="page-title">Total Views</div>
  </div>

  <div class="container">
    <div class="summary-bar">
      <div class="summary-num" id="summaryTotal">0</div>
      <div class="summary-lbl">Total Views Across All Ads</div>
      <div class="summary-note">Views update once your admin/tracking system increments the `views` column on each campaign — new ads start at 0.</div>
    </div>

    <div class="sec-title">Views by Ad</div>
    <div id="listArea"></div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item" onclick="window.location.href='vendor-dashboard.html'"><span class="nav-icon">🏠</span> Home</div>
    <div class="nav-item active" onclick="window.location.href='my-ads.html'"><span class="nav-icon">📢</span> My Ads</div>
    <div class="nav-item" onclick="window.location.href='vendor_wallet.html'"><span class="nav-icon">👛</span> Wallet</div>
    <div class="nav-item" onclick="window.location.href='vendor-settings.html'"><span class="nav-icon">⚙️</span> Settings</div>
  </div>
</div>

<script>
  // ── Supabase-backed getAds() — replaces localStorage("vendorCampaigns") ──
  // Scoped to the currently logged-in vendor (vendor_mobile column).
  async function getAds() {
    const mobile = localStorage.getItem("activeVendor");
    if (!mobile) return [];
    const { data, error } = await supabaseClient
      .from('campaigns')
      .select('*')
      .eq('vendor_mobile', mobile)
      .order('created_at', { ascending: false });
    if (error) { console.error('Supabase getAds error:', error); return []; }
    return (data || []).map(adaptRow);
  }

  function adaptRow(row) {
    return {
      id: row.id,
      type: row.type,
      title: row.title,
      name: row.title,
      desc: row.description,
      category: row.category,
      image: row.image_url,
      budget: row.budget != null ? "₹ " + Number(row.budget).toFixed(2) : "—",
      target: row.target_views,
      status: row.status,
      date: row.created_at ? new Date(row.created_at).toLocaleDateString() : "—",
      location: row.location,
      lat: row.lat,
      lng: row.lng,
      stats: { views: row.views || 0, clicks: row.clicks || 0, spent: row.spent || 0 },
      pausedAt: row.paused_at ? new Date(row.paused_at).toLocaleString() : null,
      pauseReason: row.paused_reason,
      completedDate: row.completed_at ? new Date(row.completed_at).toLocaleDateString() : null,
      rejectReason: row.reject_reason,
      vendorMobile: row.vendor_mobile
    };
  }
  function getAdName(ad) { return ad.title || ad.name || ad.id || "Untitled Ad"; }
  function typeIcon(t) { return t === "Frame" ? "🖼️" : t === "Video" ? "🎬" : t === "Survey" ? "📋" : "📢"; }

  async function render() {
    const ads = await getAds();
    const withViews = ads
      .filter(a => a.stats && typeof a.stats.views === "number")
      .sort((a, b) => b.stats.views - a.stats.views);

    const total = withViews.reduce((sum, a) => sum + a.stats.views, 0);
    document.getElementById("summaryTotal").innerText = total.toLocaleString("en-IN");

    const listArea = document.getElementById("listArea");
    if (!withViews.length) {
      listArea.innerHTML = `
        <div class="empty-state">
          <div class="ic">📈</div>
          <p>No view data yet.<br>This fills in once your Video/Survey ads start getting views.</p>
        </div>`;
      return;
    }

    listArea.innerHTML = withViews.map(ad => `
      <div class="ad-row" onclick="window.location.href='ad-viewers.html?id=${ad.id}'">
        <div class="ad-name">${typeIcon(ad.type)} ${getAdName(ad)}<span class="ad-type">${ad.type || "Ad"}</span></div>
        <div class="ad-views">${ad.stats.views}<small>views</small></div>
      </div>
    `).join("");
  }
  render();
</script>
</body>
</html>
