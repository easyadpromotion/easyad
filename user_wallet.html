<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Wallet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Poppins', sans-serif; background: #f0f2f5; display: flex; justify-content: center; min-height: 100vh; }

    .mobile-screen {
      background: #f8f9fa; width: 100%; max-width: 380px; min-height: 100vh;
      position: relative; display: flex; flex-direction: column;
      box-shadow: 0 0 30px rgba(0,0,0,0.1); border-radius: 40px; border: 8px solid white; overflow: hidden;
    }

    /* HEADER */
    .header {
      background: linear-gradient(135deg, #ff9800, #f57c00);
      padding: 30px 25px 40px; color: white;
      border-radius: 0 0 30px 30px; box-shadow: 0 10px 20px rgba(255,152,0,0.2);
      text-align: center; flex-shrink: 0;
    }
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .back-btn { font-size: 22px; text-decoration: none; color: white; }
    .page-title { font-size: 17px; font-weight: 700; }
    .stmt-btn {
      background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4);
      color: white; padding: 6px 12px; border-radius: 20px;
      font-size: 11px; font-weight: 700; cursor: pointer; font-family:'Poppins',sans-serif;
    }

    .balance-card {
      background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3);
      padding: 20px; border-radius: 20px; backdrop-filter: blur(10px); text-align: center;
    }
    .bal-label  { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.9; }
    .bal-amount { font-size: 32px; font-weight: 700; margin: 5px 0 15px; }
    .withdraw-btn {
      background: white; color: #ff9800; border: none; padding: 10px 25px;
      border-radius: 25px; font-weight: 700; cursor: pointer; font-size: 13px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1); font-family:'Poppins',sans-serif;
    }

    /* CONTENT */
    .content-area { flex: 1; padding: 20px; overflow-y: auto; padding-bottom: 90px; }
    .section-title { font-size: 14px; font-weight: 700; color: #555; margin-bottom: 15px; }

    /* TX CARD */
    .tx-card {
      background: white; padding: 14px; border-radius: 16px; margin-bottom: 10px;
      display: flex; justify-content: space-between; align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid #f0f0f0;
    }
    .tx-left { display: flex; align-items: center; gap: 12px; }
    .tx-icon { width: 40px; height: 40px; background: #e8f5e9; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .tx-icon.debit-icon { background: #fce4ec; }
    .tx-info h4 { margin: 0; font-size: 13px; font-weight: 600; color: #333; }
    .tx-info p  { margin: 2px 0 0; font-size: 10px; color: #888; }
    .tx-val       { font-size: 14px; font-weight: 700; color: #2e7d32; }
    .tx-val.debit { color: #c62828; }

    /* WITHDRAW MODAL */
    .modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 100; }
    .modal.open { display: flex; }
    .modal-box { background: white; width: 85%; padding: 25px; border-radius: 20px; text-align: center; }
    .modal-box h3 { margin-bottom: 4px; font-size: 16px; }
    .modal-sub { font-size: 11px; color: #888; margin-bottom: 14px; }
    .inp-field { width: 100%; padding: 11px 14px; margin: 6px 0; border: 1px solid #e0e0e0; border-radius: 12px; font-family:'Poppins',sans-serif; font-size: 13px; outline: none; }
    .inp-field:focus { border-color: #ff9800; }
    .modal-btn { width: 100%; padding: 12px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 8px; font-family:'Poppins',sans-serif; font-size: 13px; }
    .btn-confirm { background: #ff9800; color: white; }
    .btn-cancel  { background: #f0f0f0; color: #555; }

    /* ── STATEMENT SCREEN ── */
    .stmt-screen {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: white; z-index: 200; display: none; flex-direction: column;
    }
    .stmt-screen.open { display: flex; }

    /* Statement Header */
    .stmt-header {
      background: white; padding: 20px 20px 14px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #f0f0f0; flex-shrink: 0;
    }
    .stmt-back { font-size: 22px; cursor: pointer; color: #333; background: none; border: none; }
    .stmt-title { font-size: 17px; font-weight: 800; color: #333; }
    .stmt-help { width: 34px; height: 34px; border-radius: 50%; border: 2px solid #ddd; display: flex; align-items: center; justify-content: center; font-size: 15px; color: #888; cursor: pointer; }

    .stmt-body { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }

    /* Period toggle */
    .period-label { font-size: 13px; font-weight: 700; color: #333; margin-bottom: 12px; }
    .period-toggle {
      display: flex; background: #f0f0f0; border-radius: 14px; padding: 4px;
      margin-bottom: 22px;
    }
    .period-tab {
      flex: 1; text-align: center; padding: 9px 0; border-radius: 10px;
      font-size: 13px; font-weight: 600; color: #888; cursor: pointer; transition: 0.2s;
    }
    .period-tab.active { background: white; color: #333; font-weight: 700; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

    /* Range options */
    .range-option {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 4px; border-bottom: 1px solid #f5f5f5; cursor: pointer;
    }
    .range-option:last-child { border-bottom: none; }
    .range-label { font-size: 14px; color: #333; font-weight: 500; }
    .radio-circle {
      width: 24px; height: 24px; border-radius: 50%; border: 2px solid #ddd;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: 0.2s;
    }
    .radio-circle.checked { background: #4caf50; border-color: #4caf50; }
    .radio-check { color: white; font-size: 13px; display: none; }
    .radio-circle.checked .radio-check { display: block; }

    /* Custom date range inputs */
    .date-range-box {
      background: #f8f8f8; border-radius: 14px; padding: 14px;
      margin-top: 10px; display: none; flex-direction: column; gap: 10px;
    }
    .date-range-box.show { display: flex; }
    .date-row { display: flex; align-items: center; gap: 10px; }
    .date-lbl { font-size: 11px; font-weight: 700; color: #888; width: 30px; }
    .date-inp { flex: 1; padding: 9px 12px; border-radius: 10px; border: 1px solid #e0e0e0; font-family:'Poppins',sans-serif; font-size: 12px; outline: none; }
    .date-inp:focus { border-color: #ff9800; }

    /* Financial year options */
    .fy-option {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 4px; border-bottom: 1px solid #f5f5f5; cursor: pointer;
    }
    .fy-label { font-size: 14px; color: #333; font-weight: 500; }
    .fy-sub   { font-size: 10px; color: #aaa; margin-top: 2px; }

    /* Download button */
    .stmt-footer {
      position: absolute; bottom: 0; left: 0; width: 100%;
      padding: 16px 20px; background: white;
      border-top: 1px solid #f0f0f0;
    }
    .download-btn {
      width: 100%; padding: 15px; border: none; border-radius: 16px;
      background: linear-gradient(135deg, #6a1b9a, #4a148c);
      color: white; font-size: 15px; font-weight: 800;
      cursor: pointer; font-family:'Poppins',sans-serif;
      box-shadow: 0 4px 20px rgba(106,27,154,0.35);
      letter-spacing: 0.5px;
    }
    .download-btn:active { transform: scale(0.98); }

    /* BOTTOM NAV */
    .bottom-nav {
      position: absolute; bottom: 0; left: 0; width: 100%;
      background: white; border-top: 1px solid #f0f0f0;
      display: flex; justify-content: space-around; padding: 12px 0;
      border-radius: 20px 20px 0 0; z-index: 20;
    }
    .nav-item { text-decoration: none; display: flex; flex-direction: column; align-items: center; color: #aaa; flex: 1; }
    .nav-icon { font-size: 22px; margin-bottom: 3px; }
    .nav-text { font-size: 10px; font-weight: 600; }
    .nav-item.active { color: #ff9800; }

    /* TOAST */
    .toast { position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%); background: #222; color: white; padding: 9px 20px; border-radius: 20px; font-size: 12px; font-weight: 600; z-index: 999; white-space: nowrap; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }
  </style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = "https://ofluxzckhnydqgwtzjth.supabase.co";

<body onload="loadWallet()">
<div class="mobile-screen">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <a href="home.html" class="back-btn">←</a>
      <div class="page-title">My Wallet</div>
      <button class="stmt-btn" onclick="openStatement()">📄 Statement</button>
    </div>
    <div class="balance-card">
      <div class="bal-label">Total Balance</div>
      <div class="bal-amount" id="dispBal">₹ 0.00</div>
      <button class="withdraw-btn" onclick="openModal()">⬇ Request Withdrawal</button>
    </div>
  </div>

  <!-- TRANSACTIONS -->
  <div class="content-area">
    <div class="section-title">Recent Transactions</div>
    <div id="txList">
      <div style="text-align:center;color:#aaa;font-size:12px;margin-top:30px;">Loading transactions…</div>
    </div>
  </div>

  <!-- WITHDRAW MODAL -->
  <div id="withdrawModal" class="modal">
    <div class="modal-box">
      <h3>Request Payout</h3>
      <div class="modal-sub">Minimum withdrawal is ₹ 100.00</div>
      <input type="number" id="wAmt" class="inp-field" placeholder="Enter Amount (₹)">
      <input type="text"   id="wUpi" class="inp-field" placeholder="UPI ID (e.g. name@upi)">
      <button class="modal-btn btn-confirm" onclick="submitWithdraw()">Submit Request</button>
      <button class="modal-btn btn-cancel"  onclick="closeModal()">Cancel</button>
    </div>
  </div>

  <!-- ── STATEMENT SCREEN ── -->
  <div class="stmt-screen" id="stmtScreen">

    <div class="stmt-header">
      <button class="stmt-back" onclick="closeStatement()">←</button>
      <div class="stmt-title">My Statement</div>
      <div class="stmt-help" onclick="showToast('Select a period and tap Download Statement')">?</div>
    </div>

    <div class="stmt-body" id="stmtBody">

      <!-- Period toggle -->
      <div class="period-label">Statement Period</div>
      <div class="period-toggle">
        <div class="period-tab active" id="tabRange" onclick="switchTab('range')">Range</div>
        <div class="period-tab"        id="tabFY"    onclick="switchTab('fy')">Financial year</div>
      </div>

      <!-- RANGE OPTIONS -->
      <div id="rangeSection">
        <div class="range-option" onclick="selectRange('30')">
          <span class="range-label">Last 30 days</span>
          <div class="radio-circle checked" id="r30"><span class="radio-check">✓</span></div>
        </div>
        <div class="range-option" onclick="selectRange('90')">
          <span class="range-label">Last 90 days</span>
          <div class="radio-circle" id="r90"><span class="radio-check">✓</span></div>
        </div>
        <div class="range-option" onclick="selectRange('180')">
          <span class="range-label">Last 180 days</span>
          <div class="radio-circle" id="r180"><span class="radio-check">✓</span></div>
        </div>
        <div class="range-option" onclick="selectRange('365')">
          <span class="range-label">Last 365 days</span>
          <div class="radio-circle" id="r365"><span class="radio-check">✓</span></div>
        </div>
        <div class="range-option" onclick="selectRange('custom')">
          <span class="range-label">Select date range</span>
          <div class="radio-circle" id="rcustom"><span class="radio-check">✓</span></div>
        </div>

        <!-- Custom date inputs -->
        <div class="date-range-box" id="customDateBox">
          <div class="date-row">
            <span class="date-lbl">From</span>
            <input type="date" class="date-inp" id="dateFrom">
          </div>
          <div class="date-row">
            <span class="date-lbl">To</span>
            <input type="date" class="date-inp" id="dateTo">
          </div>
        </div>
      </div>

      <!-- FINANCIAL YEAR OPTIONS -->
      <div id="fySection" style="display:none;">
        <div id="fyList"></div>
      </div>

    </div><!-- end stmt-body -->

    <!-- Download button -->
    <div class="stmt-footer">
      <button class="download-btn" onclick="downloadStatement()">Download Statement</button>
    </div>

  </div><!-- end stmt-screen -->

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <a href="home.html"    class="nav-item"><div class="nav-icon">🏠</div><span class="nav-text">Home</span></a>
    <a href="frame-ads.html" class="nav-item"><div class="nav-icon">📢</div><span class="nav-text">Ads</span></a>
    <a href="user_wallet.html"  class="nav-item active"><div class="nav-icon">👛</div><span class="nav-text">Wallet</span></a>
    <a href="settings.html" class="nav-item"><div class="nav-icon">⚙️</div><span class="nav-text">Settings</span></a>
  </div>

</div>

<script>
  var activeMobile = localStorage.getItem("activeUser");
  var user = JSON.parse(localStorage.getItem("userProfile_"+activeMobile)) || {wallet:0, adHistory:[]};
  var selectedRange = "30";
  var selectedFY    = null;
  var activeTab     = "range";

  // ── CLOUD SYNC ──────────────────────────────────────────────
  // Balance and ad-earning history are read from Supabase (users +
  // user_ad_history), same source used by home.html / video-ads.html /
  // surveys.html / frame-ads.html — so this page shows the same numbers
  // no matter which device the person is on. Withdrawal requests are a
  // separate, not-yet-migrated system (still localStorage "withdrawalRequests")
  // and are unaffected by this change.
  async function syncUserFromCloud(mobile) {
    const { data: userRow, error: userErr } = await supabaseClient
      .from('users').select('*').eq('mobile', mobile).maybeSingle();
    if (userErr) { console.error('syncUserFromCloud user error:', userErr); return null; }

    const { data: historyRows, error: histErr } = await supabaseClient
      .from('user_ad_history').select('*').eq('user_mobile', mobile).order('created_at', { ascending: false });
    if (histErr) { console.error('syncUserFromCloud history error:', histErr); }

    const adHistory = (historyRows || []).map(function (r) {
      return { id: r.campaign_id, name: r.ad_name, type: r.ad_type, amount: r.amount, date: new Date(r.created_at).toLocaleDateString(), time: new Date(r.created_at).toLocaleTimeString() };
    });
    const viewedAds = (historyRows || []).map(function (r) { return r.campaign_id; });

    var local = JSON.parse(localStorage.getItem("userProfile_" + mobile)) || {};

    // ── One-time migration of pre-Supabase local claims (record-only,
    // never re-credits the wallet — see home.html for the full explanation). ──
    var toMigrate = (local.adHistory || []).filter(function (tx) { return tx.id && viewedAds.indexOf(tx.id) === -1; });
    if (toMigrate.length) {
      try {
        await supabaseClient.from('user_ad_history').insert(toMigrate.map(function (tx) {
          return { user_mobile: mobile, campaign_id: tx.id, ad_name: tx.name || null, ad_type: tx.type || null, amount: 0 };
        }));
        toMigrate.forEach(function (tx) {
          adHistory.unshift({ id: tx.id, name: tx.name, type: tx.type, amount: 0, date: tx.date, time: tx.time });
          viewedAds.push(tx.id);
        });
      } catch (e) { console.error('local history migration error (non-blocking):', e); }
    }

    var merged = Object.assign({}, local, {
      wallet: userRow ? (userRow.wallet || 0) : (local.wallet || 0),
      name: (userRow && (userRow.first_name || userRow.last_name)) ? [userRow.first_name, userRow.last_name].filter(Boolean).join(" ") : local.name,
      adHistory: adHistory,
      viewedAds: viewedAds
    });
    localStorage.setItem("userProfile_" + mobile, JSON.stringify(merged));
    return merged;
  }

  // ── LOAD WALLET ─────────────────────────────────────────────
  async function loadWallet(){
    // instant paint from cache
    document.getElementById("dispBal").innerText = "₹ " + parseFloat(user.wallet||0).toFixed(2);
    renderTransactions();

    // then reconcile against the cloud
    var cloud = await syncUserFromCloud(activeMobile);
    if (cloud) {
      user = cloud;
      document.getElementById("dispBal").innerText = "₹ " + parseFloat(user.wallet||0).toFixed(2);
      renderTransactions();
    }
  }

  var STATUS_LABEL = { not_paid: "Not Paid", hold: "On Hold", paid: "Paid" };

  function renderTransactions(){
    var history = user.adHistory || [];
    var list    = document.getElementById("txList");

    // Also show withdrawal history
    var allRequests = JSON.parse(localStorage.getItem("withdrawalRequests"))||[];
    var myWithdraw  = allRequests.filter(function(r){ return r.userPhone===activeMobile; });

    if(!history.length && !myWithdraw.length){
      list.innerHTML='<div style="text-align:center;color:#aaa;font-size:12px;margin-top:30px;">No transactions yet</div>';
      return;
    }

    list.innerHTML="";

    // Show ad earnings
    history.slice().reverse().forEach(function(tx){
      list.innerHTML +=
        '<div class="tx-card">' +
          '<div class="tx-left">' +
            '<div class="tx-icon">'+getTypeIcon(tx.type)+'</div>' +
            '<div class="tx-info"><h4>'+( tx.name||"Ad Earning")+'</h4><p>'+tx.type+' Ad • '+(tx.date||"")+'</p></div>' +
          '</div>' +
          '<div class="tx-val">+₹'+parseFloat(tx.amount||0).toFixed(2)+'</div>' +
        '</div>';
    });

    // Show withdrawals
    myWithdraw.slice().reverse().forEach(function(w){
      var label = STATUS_LABEL[w.status] || w.status;
      list.innerHTML +=
        '<div class="tx-card">' +
          '<div class="tx-left">' +
            '<div class="tx-icon debit-icon">⬇️</div>' +
            '<div class="tx-info"><h4>Withdrawal</h4><p>UPI: '+w.vpa+' • '+w.requestedDate+' • '+label+'</p></div>' +
          '</div>' +
          '<div class="tx-val debit">-₹'+parseFloat(w.amount||0).toFixed(2)+'</div>' +
        '</div>';
    });
  }

  function getTypeIcon(type){
    if(type==="Frame")  return "🖼️";
    if(type==="Video")  return "▶️";
    if(type==="Survey") return "📝";
    return "💰";
  }

  // ── WITHDRAW ────────────────────────────────────────────────
  function openModal()  { document.getElementById("withdrawModal").classList.add("open"); }
  function closeModal() { document.getElementById("withdrawModal").classList.remove("open"); }

  async function submitWithdraw(){
    var amt = parseFloat(document.getElementById("wAmt").value);
    var upi = document.getElementById("wUpi").value.trim();
    if(!amt||!upi){ showToast("Please enter amount and UPI ID"); return; }
    if(amt>parseFloat(user.wallet||0)){ showToast("Insufficient Balance!"); return; }
    if(amt<100){ showToast("Minimum withdrawal is ₹100"); return; }

    // Debit the cloud wallet first (source of truth) — if this fails, don't
    // touch the local balance or record a request either.
    var newBalance;
    try {
      const { data, error } = await supabaseClient.rpc('increment_user_wallet', { p_mobile: activeMobile, p_delta: -amt });
      if (error) throw error;
      newBalance = data;
    } catch (e) {
      console.error('Withdrawal wallet debit failed:', e);
      showToast("Couldn't process withdrawal — please try again.");
      return;
    }

    user.wallet = newBalance;
    localStorage.setItem("userProfile_"+activeMobile,JSON.stringify(user));

    // NOTE: this shape must match what admin_withdrawals.html / withdrawal_detail.html
    // expect, or requests submitted here won't show up correctly on the admin side.
    // ⚠️ This withdrawal-request queue itself is still localStorage-only (not yet
    // migrated to Supabase), so admins reviewing on a different device/browser
    // than the one this request was submitted from won't see it. The wallet
    // DEBIT above is already safely in the cloud regardless.
    var req = {
      id: "WID" + Math.floor(Math.random()*99999),
      userName: user.name || activeMobile,
      userPhone: activeMobile,
      amount: amt,
      mode: "upi",
      vpa: upi,
      bankAccount: "",
      ifsc: "",
      requestedDate: new Date().toLocaleDateString(),
      status: "not_paid",     // admin's vocabulary: "not_paid" | "hold" | "paid"
      holdReason: "",
      referenceId: "",
      utr: ""
    };
    var reqs = JSON.parse(localStorage.getItem("withdrawalRequests"))||[];
    reqs.push(req);
    localStorage.setItem("withdrawalRequests",JSON.stringify(reqs));

    closeModal();
    document.getElementById("wAmt").value="";
    document.getElementById("wUpi").value="";
    document.getElementById("dispBal").innerText = "₹ " + parseFloat(user.wallet).toFixed(2);
    renderTransactions();
    showToast("Withdrawal request of ₹"+amt+" sent! ✅");
  }

  // ── STATEMENT SCREEN ────────────────────────────────────────
  function openStatement(){
    buildFYList();
    document.getElementById("stmtScreen").classList.add("open");
  }
  function closeStatement(){ document.getElementById("stmtScreen").classList.remove("open"); }

  // Tab switch: Range / Financial Year
  function switchTab(tab){
    activeTab = tab;
    document.getElementById("tabRange").classList.toggle("active", tab==="range");
    document.getElementById("tabFY").classList.toggle("active",    tab==="fy");
    document.getElementById("rangeSection").style.display = tab==="range" ? "block" : "none";
    document.getElementById("fySection").style.display    = tab==="fy"    ? "block" : "none";
  }

  // Range selection
  var RANGE_IDS = ["30","90","180","365","custom"];
  function selectRange(val){
    selectedRange = val;
    RANGE_IDS.forEach(function(id){
      var el = document.getElementById("r"+id);
      if(el) el.classList.toggle("checked", id===val);
    });
    document.getElementById("customDateBox").classList.toggle("show", val==="custom");
  }

  // Build Financial Year list
  function buildFYList(){
    var fyDiv = document.getElementById("fyList");
    fyDiv.innerHTML = "";
    var currentYear = new Date().getFullYear();
    // Show last 5 financial years
    for(var i=0; i<5; i++){
      var startY = currentYear - i;
      var endY   = startY + 1;
      var fyKey  = startY+"-"+endY;
      var label  = "FY "+startY+"-"+(String(endY).slice(2));
      var sub    = "1 Apr "+startY+" – 31 Mar "+endY;
      (function(k, l, s){
        var div = document.createElement("div");
        div.className = "fy-option";
        div.innerHTML =
          '<div><div class="fy-label">'+l+'</div><div class="fy-sub">'+s+'</div></div>' +
          '<div class="radio-circle" id="fy_'+k+'"><span class="radio-check">✓</span></div>';
        div.onclick = function(){
          // Deselect all FY
          document.querySelectorAll(".fy-option .radio-circle").forEach(function(r){ r.classList.remove("checked"); });
          document.getElementById("fy_"+k).classList.add("checked");
          selectedFY = k;
        };
        fyDiv.appendChild(div);
      })(fyKey, label, sub);
    }
    // Pre-select current FY
    var curFY = currentYear+"-"+(currentYear+1);
    var el = document.getElementById("fy_"+curFY);
    if(el){ el.classList.add("checked"); selectedFY = curFY; }
  }

  // ── DOWNLOAD STATEMENT ──────────────────────────────────────
  function downloadStatement(){
    var history  = user.adHistory || [];
    var requests = (JSON.parse(localStorage.getItem("withdrawalRequests"))||[]).filter(function(r){ return r.userPhone===activeMobile; });

    // Determine date range
    var fromDate = null, toDate = new Date();
    toDate.setHours(23,59,59,999);

    if(activeTab==="range"){
      if(selectedRange==="custom"){
        var df = document.getElementById("dateFrom").value;
        var dt = document.getElementById("dateTo").value;
        if(!df||!dt){ showToast("Please select From and To dates"); return; }
        fromDate = new Date(df);
        toDate   = new Date(dt); toDate.setHours(23,59,59,999);
      } else {
        fromDate = new Date();
        fromDate.setDate(fromDate.getDate() - parseInt(selectedRange));
      }
    } else {
      // Financial year
      if(!selectedFY){ showToast("Please select a financial year"); return; }
      var parts = selectedFY.split("-");
      fromDate = new Date(parseInt(parts[0]), 3, 1);   // Apr 1
      toDate   = new Date(parseInt(parts[1]), 2, 31);  // Mar 31
      toDate.setHours(23,59,59,999);
    }

    // Filter transactions by date
    function inRange(dateStr){
      if(!dateStr) return false;
      var parts = dateStr.split("/");
      var d;
      if(parts.length===3) d = new Date(parts[2], parts[1]-1, parts[0]);
      else d = new Date(dateStr);
      return d >= fromDate && d <= toDate;
    }

    var filteredHistory  = history.filter(function(tx){ return inRange(tx.date); });
    var filteredWithdraw = requests.filter(function(w){ return inRange(w.requestedDate); });

    if(!filteredHistory.length && !filteredWithdraw.length){
      showToast("No transactions found for this period");
      return;
    }

    // ── Build HTML statement ──────────────────────────────────
    var totalEarned   = filteredHistory.reduce(function(s,tx){ return s+parseFloat(tx.amount||0); },0);
    var totalWithdrawn= filteredWithdraw.reduce(function(s,w){ return s+parseFloat(w.amount||0); },0);
    var periodLabel   = activeTab==="range"
      ? (selectedRange==="custom"
          ? document.getElementById("dateFrom").value+" to "+document.getElementById("dateTo").value
          : "Last "+selectedRange+" days")
      : "FY "+selectedFY;

    var rows = "";
    filteredHistory.forEach(function(tx,i){
      rows +=
        '<tr style="background:'+(i%2===0?'#fff':'#fafafa')+'">' +
          '<td style="padding:8px 10px;">'+( tx.date||"-")+'</td>' +
          '<td style="padding:8px 10px;">'+(tx.name||"Ad Earning")+'</td>' +
          '<td style="padding:8px 10px;">'+(tx.type||"-")+' Ad</td>' +
          '<td style="padding:8px 10px;color:#2e7d32;font-weight:700;">+₹'+parseFloat(tx.amount||0).toFixed(2)+'</td>' +
          '<td style="padding:8px 10px;color:#4caf50;">Credit</td>' +
        '</tr>';
    });
    filteredWithdraw.forEach(function(w,i){
      var idx = filteredHistory.length+i;
      rows +=
        '<tr style="background:'+(idx%2===0?'#fff':'#fafafa')+'">' +
          '<td style="padding:8px 10px;">'+(w.requestedDate||"-")+'</td>' +
          '<td style="padding:8px 10px;">Withdrawal</td>' +
          '<td style="padding:8px 10px;">UPI: '+w.vpa+'</td>' +
          '<td style="padding:8px 10px;color:#c62828;font-weight:700;">-₹'+parseFloat(w.amount||0).toFixed(2)+'</td>' +
          '<td style="padding:8px 10px;color:'+(w.status==="paid"?"#2e7d32":w.status==="hold"?"#e65100":"#ff9800")+';">'+(STATUS_LABEL[w.status]||w.status)+'</td>' +
        '</tr>';
    });

    var html =
      '<!DOCTYPE html><html><head><meta charset="UTF-8">'+
      '<title>EAP Statement</title>'+
      '<style>body{font-family:Poppins,sans-serif;margin:0;padding:20px;color:#333;}'+
      'h1{color:#ff9800;}table{width:100%;border-collapse:collapse;margin-top:16px;}'+
      'th{background:#ff9800;color:white;padding:10px;text-align:left;font-size:12px;}'+
      'td{font-size:12px;border-bottom:1px solid #f0f0f0;}'+
      '.summary{display:flex;gap:16px;margin:16px 0;flex-wrap:wrap;}'+
      '.sum-box{flex:1;min-width:120px;background:#f8f8f8;border-radius:12px;padding:14px;text-align:center;}'+
      '.sum-val{font-size:20px;font-weight:800;margin-top:4px;}'+
      '@media print{button{display:none!important;}}'+
      '</style></head><body>'+

      '<h1>🧾 EAP Wallet Statement</h1>'+
      '<p style="color:#888;font-size:13px;">User: <b>'+(user.name||activeMobile)+'</b> &nbsp;|&nbsp; Period: <b>'+periodLabel+'</b> &nbsp;|&nbsp; Generated: <b>'+new Date().toLocaleDateString()+'</b></p>'+

      '<div class="summary">'+
        '<div class="sum-box"><div style="font-size:11px;color:#888;">TOTAL EARNED</div><div class="sum-val" style="color:#2e7d32;">₹'+totalEarned.toFixed(2)+'</div></div>'+
        '<div class="sum-box"><div style="font-size:11px;color:#888;">WITHDRAWN</div><div class="sum-val" style="color:#c62828;">₹'+totalWithdrawn.toFixed(2)+'</div></div>'+
        '<div class="sum-box"><div style="font-size:11px;color:#888;">NET BALANCE</div><div class="sum-val" style="color:#ff9800;">₹'+(totalEarned-totalWithdrawn).toFixed(2)+'</div></div>'+
        '<div class="sum-box"><div style="font-size:11px;color:#888;">TRANSACTIONS</div><div class="sum-val">'+(filteredHistory.length+filteredWithdraw.length)+'</div></div>'+
      '</div>'+

      '<table><thead><tr>'+
        '<th>Date</th><th>Description</th><th>Type</th><th>Amount</th><th>Status</th>'+
      '</tr></thead><tbody>'+rows+'</tbody></table>'+

      '<br><button onclick="window.print()" style="background:#6a1b9a;color:white;border:none;padding:12px 28px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;margin-right:10px;">🖨️ Print</button>'+
      '<button onclick="window.close()" style="background:#f0f0f0;color:#555;border:none;padding:12px 28px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;">Close</button>'+
      '</body></html>';

    // Open in new tab
    var win = window.open("","_blank");
    if(win){
      win.document.write(html);
      win.document.close();
    } else {
      // file:// fallback — download as HTML file
      var blob = new Blob([html], {type:"text/html"});
      var a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "EAP_Statement_"+periodLabel.replace(/\s/g,"_")+".html";
      a.style.display="none";
      document.body.appendChild(a); a.click();
      setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(a.href); },300);
      showToast("Statement downloaded! 📄");
    }
  }

  // ── TOAST ───────────────────────────────────────────────────
  function showToast(msg){
    var t=document.getElementById("toast");
    t.innerText=msg; t.classList.add("show");
    setTimeout(function(){ t.classList.remove("show"); },2800);
  }
</script>
</body>
</html>
